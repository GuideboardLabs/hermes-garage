[custodian]
; Model endpoint for Custodian walks.
; Swap this when switching the workhorse model on port 8094.
;
; LLAMA_MODEL = lfm25-8b   # LFM2.5-8B (default, fast, good at wandering)
; LLAMA_MODEL = gemma4-12b  # Gemma4-12B (slower, deeper reasoning)
;
; LLAMA_URL can also be overridden if you move the endpoint.
LLAMA_URL = http://127.0.0.1:8093
LLAMA_MODEL = qwen3.5-9b